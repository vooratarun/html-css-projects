<header class="banner">
  <div class="banner__contents">
    <h1 class="banner__title">{{ title }}</h1>
    <div class="banner__buttons">
      <button class="banner__button" (click)="onPlayClick()">Play</button>
      <button class="banner__button" (click)="onMyListClick()">My List</button>
    </div>
    <h1 class="banner__description">{{ description }}</h1>
  </div>
  <div class="banner--fadeBottom"></div>
</header>
