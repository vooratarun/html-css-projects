<div class="sidebar">
  <button class="sidebar__compose"><span class="material-icons"> add </span>Compose</button>

  @for (item of sidebarItems; track item.label) {
    <div class="sidebarOption" [class.sidebarOption__active]="item.active">
      <span class="material-icons"> {{ item.icon }} </span>
      <h3>{{ item.label }}</h3>
    </div>
  }

  <div class="sidebar__footer">
    <div class="sidebar__footerIcons">
      <span class="material-icons"> person </span>
      <span class="material-icons"> duo </span>
      <span class="material-icons"> phone </span>
    </div>
  </div>
</div>
